services:
  # --- BASE DE DATOS PRINCIPAL ---
  db:
    build: ./databases/postgres
    container_name: erp_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./databases/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - erp-platform
    logging:
      driver: "json-file"
      options:
        tag: "{{.Name}}"

  # --- CACHÉ Y COLAS ---
  cache:
    build: ./databases/redis
    container_name: erp_redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - erp-platform
    logging:
      driver: "json-file"
      options:
        tag: "{{.Name}}"

  # --- EXPORTERS PARA OBSERVABILIDAD ---
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: erp_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
    networks:
      - erp-platform

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: erp_redis_exporter
    environment:
      - REDIS_ADDR=redis://cache:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - erp-platform

volumes:
  postgres_data:
  redis_data:

networks:
  erp-platform:
    external: true